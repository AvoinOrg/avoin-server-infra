services:
  # SeaweedFS replaces the old Supabase Storage API as the S3-compatible layer.
  # Credentials and bucket-scoped policies are kept in ./s3.json, which is not
  # committed because it contains live access keys.
  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.37}
    container_name: seaweedfs
    command:
      - server
      - -dir=/data
      - -ip=seaweedfs
      - -ip.bind=0.0.0.0
      - -master.port=9333
      - -volume.port=8080
      - -volume.max=${SEAWEEDFS_VOLUME_MAX:-64}
      - -volume.minFreeSpace=${SEAWEEDFS_VOLUME_MIN_FREE_SPACE:-2GiB}
      - -filer
      - -filer.port=8888
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -s3.cacheCapacityMB=${SEAWEEDFS_S3_CACHE_MB:-128}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ${SEAWEEDFS_DATA_DIR:-./volumes/seaweedfs}:/data:z
      - ./s3.json:/etc/seaweedfs/s3.json:ro,z
    networks:
      - supabase
      - proxy-net

  image-server:
    build:
      context: ./image-server
    container_name: storage-image-server
    environment:
      IMAGE_SERVER_PORT: "8080"
      IMAGE_SERVER_SUPABASE_PREFIX: "${IMAGE_SERVER_SUPABASE_PREFIX:-storage-single-tenant}"
      IMAGE_SERVER_CACHE_CONTROL: "${IMAGE_SERVER_CACHE_CONTROL:-public, max-age=31536000, immutable}"
      GLOBAL_S3_BUCKET: "${GLOBAL_S3_BUCKET:-}"
      GLOBAL_S3_ENDPOINT: "${GLOBAL_S3_ENDPOINT:-}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-}"
      REGION: "${REGION:-hel1}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - proxy-net

  # Legacy Supabase Storage stack. It is retained only for rollback and for
  # one-time migration reads from the old S3 gateway.
  db:
    profiles: ["legacy-supabase"]
    image: supabase/postgres:17.4.1.068
    container_name: supabase-db
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SUPABASE_ROLES_PASSWORD: ${POSTGRES_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${POSTGRES_DATA_DIR:-./volumes/postgres}:/var/lib/postgresql/data:z
    networks:
      - supabase

  imgproxy:
    profiles: ["legacy-supabase"]
    image: ghcr.io/imgproxy/imgproxy:v3.29.1
    container_name: supabase-imgproxy
    env_file:
      - ./.env
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_S3_REGION: "${AWS_DEFAULT_REGION:-}"
      IMGPROXY_S3_ENDPOINT: "${GLOBAL_S3_ENDPOINT:-}"
      IMGPROXY_S3_FORCE_PATH_STYLE: "${GLOBAL_S3_FORCE_PATH_STYLE:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - supabase
      - proxy-net

  storage:
    profiles: ["legacy-supabase"]
    image: supabase/storage-api:v1.25.12
    container_name: supabase-storage
    env_file:
      - ./.env
      - ./.storage.env
    environment:
      PGRST_JWT_SECRET: ${JWT_SECRET:-}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
      imgproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./volumes/storage:/var/lib/storage:z
    networks:
      - supabase
      - proxy-net

networks:
  supabase:
    driver: bridge
  proxy-net:
    external: true
