x-kan-env: &kan-env
  NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:?set NEXT_PUBLIC_BASE_URL}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
  POSTGRES_URL: postgresql://kan:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/kan_db
  REDIS_URL: ${REDIS_URL:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  KAN_ADMIN_API_KEY: ${KAN_ADMIN_API_KEY:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}
  EMAIL_FROM: ${EMAIL_FROM:-}
  NEXT_PUBLIC_DISABLE_EMAIL: ${NEXT_PUBLIC_DISABLE_EMAIL:-false}
  NEXT_PUBLIC_ALLOW_CREDENTIALS: ${NEXT_PUBLIC_ALLOW_CREDENTIALS:-false}
  NEXT_PUBLIC_DISABLE_SIGN_UP: ${NEXT_PUBLIC_DISABLE_SIGN_UP:-true}
  NEXT_PUBLIC_WHITE_LABEL_HIDE_POWERED_BY: ${NEXT_PUBLIC_WHITE_LABEL_HIDE_POWERED_BY:-true}
  NEXT_API_BODY_SIZE_LIMIT: ${NEXT_API_BODY_SIZE_LIMIT:-50mb}
  TRELLO_APP_API_KEY: ${TRELLO_APP_API_KEY:-}
  TRELLO_APP_SECRET: ${TRELLO_APP_SECRET:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
  BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
  BETTER_AUTH_ALLOWED_DOMAINS: ${BETTER_AUTH_ALLOWED_DOMAINS:-}

services:
  migrate:
    image: ghcr.io/kanbn/kan-migrate:${KAN_IMAGE_TAG:-latest}
    restart: "no"
    environment:
      POSTGRES_URL: postgresql://kan:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/kan_db
    networks:
      - kan-net
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/kanbn/kan:${KAN_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *kan-env
    networks:
      - kan-net
      - dokploy-network
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kan_db
      POSTGRES_USER: kan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - ${DATA_PATH:?set DATA_PATH}/postgres:/var/lib/postgresql/data
    networks:
      - kan-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kan -d kan_db"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  kan-net:
    driver: bridge
  dokploy-network:
    external: true
