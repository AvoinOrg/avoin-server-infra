name: ${COMPOSE_PROJECT_NAME:-pelias}

networks:
  pelias-net:
    driver: bridge
  proxy-net:
    external: true

services:
  elasticsearch:
    image: pelias/elasticsearch:${PELIAS_ELASTICSEARCH_IMAGE_TAG}
    restart: unless-stopped
    environment:
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS}
      discovery.type: single-node
      bootstrap.memory_lock: "true"
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    volumes:
      - ${DATA_PATH}/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - pelias-net

  config-render:
    image: ${PELIAS_CONFIG_RENDER_IMAGE}
    profiles:
      - tools
    restart: "no"
    working_dir: /work
    command: ["node", "/work/scripts/render-pelias-config.mjs"]
    environment:
      PELIAS_CONFIG_TEMPLATE: /work/pelias.json.template
      PELIAS_CONFIG_DIR: ${PELIAS_CONFIG_DIR}
      PELIAS_CONFIG_OUTPUT: ${PELIAS_CONFIG_PATH}
      OSM_PBF_URL: ${OSM_PBF_URL}
      OSM_PBF_FILENAME: ${OSM_PBF_FILENAME}
      OSM_DATA_PATH: ${OSM_DATA_PATH}
      OSM_LEVELDB_PATH: ${OSM_LEVELDB_PATH}
      OSM_ADMIN_LOOKUP_ENABLED: ${OSM_ADMIN_LOOKUP_ENABLED}
      OSM_IMPORT_VENUES: ${OSM_IMPORT_VENUES}
      OSM_REMOVE_DISUSED_VENUES: ${OSM_REMOVE_DISUSED_VENUES}
      PELIAS_FINNISH_DATA_PATH: ${PELIAS_FINNISH_DATA_PATH}
      PELIAS_CSV_DATA_PATH: ${PELIAS_CSV_DATA_PATH}
      PELIAS_CSV_IMPORT_FILES: ${PELIAS_CSV_IMPORT_FILES}
      PELIAS_CSV_DOWNLOAD_URLS: ${PELIAS_CSV_DOWNLOAD_URLS}
    volumes:
      - ./pelias.json.template:/work/pelias.json.template:ro
      - ./scripts/render-pelias-config.mjs:/work/scripts/render-pelias-config.mjs:ro
      - ${PELIAS_CONFIG_DIR}:${PELIAS_CONFIG_DIR}
    networks:
      - pelias-net

  libpostal:
    image: pelias/libpostal-service:${PELIAS_LIBPOSTAL_IMAGE_TAG}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -T 5 -O - 'http://localhost:4400/parse?address=test' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - pelias-net

  api:
    image: pelias/api:${PELIAS_API_IMAGE_TAG}
    restart: unless-stopped
    environment:
      PORT: "4000"
      PELIAS_CONFIG: /code/pelias.json
    depends_on:
      elasticsearch:
        condition: service_healthy
      libpostal:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -T 5 -O - 'http://localhost:4000/v1' >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
    networks:
      - pelias-net
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-net"
      - "traefik.http.routers.pelias.rule=Host(`${PELIAS_DOMAIN}`)"
      - "traefik.http.routers.pelias.entrypoints=websecure"
      - "traefik.http.routers.pelias.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.services.pelias.loadbalancer.server.port=4000"

  schema:
    image: pelias/schema:${PELIAS_SCHEMA_IMAGE_TAG}
    profiles:
      - tools
    restart: "no"
    command: ["npm", "run", "create_index"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
    networks:
      - pelias-net

  schema-drop-index:
    image: pelias/schema:${PELIAS_SCHEMA_IMAGE_TAG}
    profiles:
      - tools
    restart: "no"
    command: ["node", "scripts/drop_index.js", "--force-yes"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
    networks:
      - pelias-net

  config-check:
    image: pelias/api:${PELIAS_API_IMAGE_TAG}
    profiles:
      - tools
    restart: "no"
    command: ["npm", "run", "config"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
    networks:
      - pelias-net

  osm-download:
    image: pelias/openstreetmap:${PELIAS_OPENSTREETMAP_IMAGE_TAG}
    profiles:
      - import
    restart: "no"
    command: ["npm", "run", "download"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
      - ${OSM_DATA_PATH}:${OSM_DATA_PATH}
      - ${OSM_LEVELDB_PATH}:${OSM_LEVELDB_PATH}
    networks:
      - pelias-net

  osm-import:
    image: pelias/openstreetmap:${PELIAS_OPENSTREETMAP_IMAGE_TAG}
    profiles:
      - import
    restart: "no"
    command: ["npm", "start"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
      - ${OSM_DATA_PATH}:${OSM_DATA_PATH}
      - ${OSM_LEVELDB_PATH}:${OSM_LEVELDB_PATH}
    networks:
      - pelias-net

  csv-import:
    image: pelias/csv-importer:${PELIAS_CSV_IMPORTER_IMAGE_TAG}
    profiles:
      - custom-data
    restart: "no"
    command: ["./bin/start"]
    environment:
      PELIAS_CONFIG: /code/pelias.json
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ${PELIAS_CONFIG_PATH}:/code/pelias.json:ro
      - ${PELIAS_CSV_DATA_PATH}:${PELIAS_CSV_DATA_PATH}
    networks:
      - pelias-net
